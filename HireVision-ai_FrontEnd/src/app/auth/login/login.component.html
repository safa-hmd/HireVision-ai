<div class="user-auth-shell">
  <div class="auth-card">
    <div class="brand">
      <img src="assets/img/brand/hirevision-logo.png" alt="HireVision AI" class="brand-logo" />
      <p>Connectez-vous à votre espace</p>
    </div>

    <form (ngSubmit)="handleLogin()">

      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <div class="input-wrap">
          <input class="form-input" [(ngModel)]="email" name="email"
                 type="email" placeholder="jean@exemple.com" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
          <label class="form-label" style="margin:0">Mot de passe</label>
          <a routerLink="/auth/forgot-password" class="auth-link" style="font-size:.82rem">
            Mot de passe oublié ?
          </a>
        </div>
        <div class="input-wrap">
          <input class="form-input" [(ngModel)]="password" name="password"
                 [type]="showPwd ? 'text' : 'password'"
                 placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="eye-btn" (click)="showPwd = !showPwd">
            👁
          </button>
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-msg show">{{ errorMsg }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <div class="divider"><span>ou avec</span></div>

    <button class="btn-social" type="button" (click)="loginWithGoogle()">
      <div class="social-icon" style="background:#EA4335">G</div>
      Continuer avec Google
    </button>

    <button class="btn-social" type="button" (click)="loginWithGithub()">
      <div class="social-icon" style="background:#181717">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="#fff">
          <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.08.55-.17.55-.38
                   0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                   -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                   .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                   -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0
                   c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
                   2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93
                   -.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
      </div>
      Continuer avec GitHub
    </button>

    <div class="auth-footer">
      Pas encore de compte ?
      <a routerLink="/auth/register" class="auth-link">Créer un compte</a>
    </div>

    <div class="auth-footer" style="margin-top:10px">
      <a routerLink="/auth/admin-login" class="auth-link" style="font-size:.8rem;opacity:.75">
        Accès administrateur
      </a>
    </div>
  </div>
</div>
