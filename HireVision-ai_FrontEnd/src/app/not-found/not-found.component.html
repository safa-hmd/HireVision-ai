<!DOCTYPE html>
<div class="nf-page">

  <!-- Particules d'arrière-plan -->
  <div class="nf-particles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- Carte centrale -->
  <div class="nf-card">

    <!-- Code 404 animé -->
    <div class="nf-code">
      <span class="digit" style="--d:0">4</span>
      <span class="digit zero" style="--d:1">0</span>
      <span class="digit" style="--d:2">4</span>
    </div>

    <!-- Icône -->
    <div class="nf-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="4"/>
        <line x1="30" y1="65" x2="70" y2="65" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <circle cx="35" cy="40" r="6" fill="currentColor"/>
        <circle cx="65" cy="40" r="6" fill="currentColor"/>
      </svg>
    </div>

    <h1 class="nf-title">Page introuvable</h1>
    <p class="nf-subtitle">
      Oups ! La page que vous cherchez n'existe pas ou a été déplacée.
    </p>

    <!-- Info contexte -->
    <div class="nf-url-badge">
      <span class="nf-badge-icon">🔗</span>
      <span class="nf-badge-text">{{ currentUrl }}</span>
    </div>

    <!-- Actions -->
    <div class="nf-actions">
      <button class="nf-btn-primary" (click)="goHome()" id="btn-go-home">
        <span class="btn-icon">🏠</span>
        Retour à l'accueil
      </button>
      <a class="nf-btn-secondary" routerLink="/auth/login" id="btn-go-login">
        <span class="btn-icon">🔑</span>
        Se connecter
      </a>
    </div>

    <!-- Footer hint -->
    <p class="nf-hint">
      Vérifiez l'URL ou revenez sur la bonne piste avec HireVision AI 🚀
    </p>

  </div>

</div>
