  <div class="theme-switcher" style="padding: 10px 14px; margin-top: auto; border-top: 1px solid rgba(255,255,255,.07);">
    <button class="theme-btn" (click)="toggleTheme()" style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 8px 12px; font-size: 13px; font-weight: 600; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: #fff; border-radius: 8px; cursor: pointer; opacity: 0.8; transition: all 0.2s ease;">
      <span style="display: flex; align-items: center;">
        <!-- Sun icon (for dark mode) -->
        <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon (for light mode) -->
        <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </span>
      <span>{{ isDarkMode ? 'Mode Clair' : 'Mode Sombre' }}</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <a (click)="logout()" style="cursor:pointer;"><i data-lucide="log-out"></i> Déconnexion</a>
