services:
  mysql:
    image: mysql:8.0
    container_name: hirevision-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: hirevisiondb
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hirevision-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: hirevision-ai
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-120b}
      # Optionnel mais recommandé : accélère/stabilise le téléchargement du
      # modèle HF au tout premier build (avant qu'il soit mis en cache dans
      # l'image par le Dockerfile). Génère un token gratuit sur huggingface.co.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./ai-service:/app
    ports:
      - "8000:8000"
    healthcheck:
      # raise_for_status() est essentiel : sans lui, httpx.get() sur une
      # réponse 503 ("status": "loading") ne lève PAS d'exception et le
      # healthcheck passerait au vert avant que le modèle soit vraiment prêt.
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 5s
      timeout: 3s
      retries: 30
      # Le premier chargement du modèle sentence-transformers peut prendre
      # jusqu'à 1-2 minutes (surtout sans HF_TOKEN et sans le cache du
      # Dockerfile). On laisse de la marge pour ne pas déclarer le service
      # "unhealthy" à tort pendant ce chargement.
      start_period: 120s
    networks:
      - hirevision-net

  backend:
    build:
      context: ./HireVision-ai
      dockerfile: Dockerfile
    container_name: hirevision-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/hirevisiondb?createDatabaseIfNotExist=true&useUnicode=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}

      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/hirevisiondb?createDatabaseIfNotExist=true&useUnicode=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      JWT_SECRET: ${JWT_SECRET:-changeMeInProduction123}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: "http://localhost:4200"
      AI_SERVICE_URL: "http://ai-service:8000"
      PORT: 8086
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/HireVision/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - hirevision-net

  frontend:
    build:
      context: ./HireVision-ai_FrontEnd
      dockerfile: Dockerfile
    container_name: hirevision-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - hirevision-net

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  hirevision-net:
    driver: bridge