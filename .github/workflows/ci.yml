name: HireVision CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: HireVision-ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: HireVision-ai_FrontEnd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: HireVision-ai_FrontEnd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --configuration production

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cat > .env << EOF
          DB_USERNAME=root
          DB_PASSWORD=root
          JWT_SECRET=changeMeInProduction123
          JWT_EXPIRATION=3600000
          GROQ_API_KEY=
          GROQ_MODEL=openai/gpt-oss-120b
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          MAIL_USERNAME=
          MAIL_PASSWORD=
          FRONTEND_URL=http://localhost:4200
          EOF

      - name: Build Docker images
        run: docker compose build
